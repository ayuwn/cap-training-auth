<!DOCTYPE html>
<html>
<head>
    <title>Training Management</title>
    <link rel="stylesheet" href="/resources/style.css">
</head>

<body>

<div class="card">

    <h1>Training Management System</h1>

    <label>Email</label>
    <div class="input-wrapper">
        <input
            id="email"
            type="email"
            placeholder="Enter your email"
        />
    </div>

    <label>Password</label>
    <div class="input-wrapper">
        <input
            id="password"
            type="password"
            placeholder="Enter your password"
        />
        <button
            type="button"
            class="toggle-password"
            id="togglePasswordBtn"
            onclick="togglePassword()">
            Show
        </button>
    </div>

    <button onclick="login()">
        Login
    </button>

    <button
        class="analytics-btn"
        onclick="openAnalytics()">
        Open Analytics Dashboard
    </button>

    <div id="message" class="message"></div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <div class="loading-text">
                Loading...
            </div>
        </div>
    </div>

    <div class="footer-note">
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
    getAuth,
    signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyA4aW_QbXsBUK1IE3gmuviguktZ_W2gH_0",
    authDomain: "training-management-cap-b9c34.firebaseapp.com",
    projectId: "training-management-cap-b9c34",
    storageBucket: "training-management-cap-b9c34.firebasestorage.app",
    messagingSenderId: "159574335337",
    appId: "1:159574335337:web:5f03b457e9eb8e7ae527f8",
    measurementId: "G-NV8LCGCYCR"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const ALLOWED_USERS = {
    "admin@training.com": "admin",
    "supervisor@training.com": "supervisor"
};

function showMessage(text) {
    const message = document.getElementById("message");
    message.innerText = text;
    message.style.display = "block";
}

function clearMessage() {
    const message = document.getElementById("message");
    message.innerText = "";
    message.style.display = "none";
}

function showLoading(text = "Loading...") {
    document.querySelector(".loading-text").innerText = text;
    document.getElementById("loadingOverlay").style.display = "flex";
}

function hideLoading() {
    document.getElementById("loadingOverlay").style.display = "none";
}

window.addEventListener("pageshow", function (event) {

    hideLoading();

    if (event.persisted) {
        hideLoading();
    }

});

async function createSession(email, password) {
    const result = await signInWithEmailAndPassword(auth, email, password);
    const idToken = await result.user.getIdToken();

    const response = await fetch("/sessionLogin", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ idToken })
    });

    if (!response.ok) {
        throw new Error("Login session failed.");
    }

    return ALLOWED_USERS[email];
}

window.togglePassword = function () {
    const input = document.getElementById("password");
    const btn = document.getElementById("togglePasswordBtn");

    if (input.type === "password") {
        input.type = "text";
        btn.innerHTML = "Hide"; // hide password
    } else {
        input.type = "password";
        btn.innerHTML = "Show"; // show password
    }
};

window.login = async function () {
    clearMessage();

    const email = document.getElementById("email").value.trim().toLowerCase();
    const password = document.getElementById("password").value;

    if (!email || !password) {
        showMessage("Please input email and password.");
        return;
    }

    if (!ALLOWED_USERS[email]) {
        showMessage("Credential error: email is not registered as admin or supervisor.");
        return;
    }

    try {
        showLoading("Opening Training Request...");

        const role = await createSession(email, password);

        // if (role === "admin") {
        //     location.href = "/sap.fe.cap.training/index.html?role=admin";
        // } else if (role === "supervisor") {
        //     location.href = "/sap.fe.cap.training/index.html?role=supervisor";
        // }

        setTimeout(() => {
            if (role === "admin") {
                location.href = "/sap.fe.cap.training/index.html?role=admin";
            } else if (role === "supervisor") {
                location.href = "/sap.fe.cap.training/index.html?role=supervisor";
            }
        }, 500);

    } catch (error) {
        handleLoginError(error);
    }
};

window.openAnalytics = async function () {
    clearMessage();

    const email = document.getElementById("email").value.trim().toLowerCase();
    const password = document.getElementById("password").value;

    if (!email || !password) {
        showMessage("Please input email and password before opening analytics.");
        return;
    }

    if (!ALLOWED_USERS[email]) {
        showMessage("Credential error: email is not registered as admin or supervisor.");
        return;
    }

    try {
        showLoading("Opening Analytics Dashboard...");
        await createSession(email, password);
        // location.href = "/sap.fe.cap.training_analytics/index.html";
        setTimeout(() => {
            location.href = "/sap.fe.cap.training_analytics/index.html";
        }, 500);
    } catch (error) {
        handleLoginError(error);
    }
};

function handleLoginError(error) {
    hideLoading();
    console.error(error);

    if (error.code === "auth/too-many-requests") {
        showMessage("Too many login attempts. Please wait and try again later.");
    } else if (
        error.code === "auth/invalid-credential" ||
        error.code === "auth/user-not-found"
    ) {
        showMessage("Credential error: email or password is incorrect.");
    } else if (error.code === "auth/wrong-password") {
        showMessage("Wrong password.");
    } else if (error.code === "auth/invalid-email") {
        showMessage("Invalid email format.");
    } else {
        showMessage(error.message || "Login failed.");
    }
}
</script>

</body>
</html>
